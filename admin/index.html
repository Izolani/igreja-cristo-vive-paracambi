<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo - Igreja Cristo Vive</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #0f172a;
    color: white;
}

.login-screen, .dashboard {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 300px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #fbbf24;
    font-weight: bold;
    cursor: pointer;
}

.dashboard {
    display: none;
    flex-direction: column;
    padding: 20px;
}

.header {
    font-size: 1.5rem;
    margin-bottom: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.box {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
}

.box:hover {
    background: #334155;
}
</style>

</head>

<body>

<!-- LOGIN -->

<div class="login-screen" id="login">
    <div class="card">
        <h2>🔐 Painel Admin</h2>
        <input type="password" id="senha" placeholder="Digite a senha">
        <button onclick="login()">Entrar</button>
    </div>
</div>

<!-- DASHBOARD -->

<div class="dashboard" id="dashboard">
    <div class="header">📊 Painel da Igreja</div>

```
<div class="grid">
    <div class="box" onclick="alert('Em breve: Fotos')">📸 Galeria</div>
    <div class="box" onclick="alert('Em breve: Vídeos')">🎥 Vídeos</div>
    <div class="box" onclick="alert('Em breve: Agenda')">📅 Agenda</div>
    <div class="box" onclick="alert('Em breve: Orações')">🙏 Orações</div>
    <div class="box" onclick="alert('Em breve: Versículos')">📖 Versículos</div>
</div>

<br>
<button onclick="logout()">Sair</button>
```

</div>

<script>
function login() {
    const senha = document.getElementById('senha').value;

    if (senha === "1234") {
        document.getElementById('login').style.display = "none";
        document.getElementById('dashboard').style.display = "flex";
    } else {
        alert("Senha incorreta!");
    }
}

function logout() {
    location.reload();
}
</script>

</body>
</html>
